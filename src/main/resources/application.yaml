spring:
  application:
    name: travelan
  profiles:
    active: dev
  docker:
    compose:
      file: docker-compose.yml
  datasource:
    url: jdbc:mysql://localhost:3306/travelan?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: travelan
    password: travelan
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 900       # 15분 (초)
  refresh-token-expiry: 2592000  # 30일 (초)

management:
  endpoints:
    web:
      exposure:
        include: health
